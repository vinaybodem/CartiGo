server:
  port: 8080

spring:
  application:
    name: cartigo-api-gateway

  # If you use config-server, keep this (optional)
  config:
    import: "optional:configserver:http://localhost:8888"

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      # ✅ Gateway-level CORS (recommended)
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: false

      routes:
        # Auth service
        - id: auth-service
          uri: lb://cartigo-auth-service
          predicates:
            - Path=/auth/**

        # User service
        - id: user-service
          uri: lb://cartigo-user-service
          predicates:
            - Path=/api/users/**,/api/customers/**,/api/sellers/**,/api/admins/**

        # Product service
        - id: product-service
          uri: lb://cartigo-product-service
          predicates:
            - Path=/api/products/**,/api/categories/**

        # Cart service
        - id: cart-service
          uri: lb://cartigo-cart-service
          predicates:
            - Path=/api/cart/**

        # Inventory service
        - id: inventory-service
          uri: lb://cartigo-inventory-service
          predicates:
            - Path=/api/inventory/**

        # Order service
        - id: order-service
          uri: lb://cartigo-order-service
          predicates:
            - Path=/api/orders/**

        # Payment service
        - id: payment-service
          uri: lb://cartigo-payment-service
          predicates:
            - Path=/api/payments/**

        # Review service
        - id: review-service
          uri: lb://cartigo-review-service
          predicates:
            - Path=/api/reviews/**

        # Return/Refund service (your controller is /api/returns/**)
        - id: return-refund-service
          uri: lb://cartigo-return-refund-service
          predicates:
            - Path=/api/returns/**

        # Reporting/Analytics service
        - id: reporting-analytics-service
          uri: lb://cartigo-reporting-analytics-service
          predicates:
            - Path=/api/analytics/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway

server:
  port: 8080

spring:
  application:
    name: cartigo-api-gateway

  # If you use config-server, keep this (optional)
  config:
    import: "optional:configserver:http://localhost:8888"

  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true

          # ✅ Gateway-level CORS (recommended)
          globalcors:
            corsConfigurations:
              '[/**]':
                allowedOrigins: "*"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - PATCH
                  - DELETE
                  - OPTIONS
                allowedHeaders: "*"
                allowCredentials: false

          routes:
            # Auth service
            - id: auth-service
              uri: lb://CARTIGO-AUTH-SERVICE
              predicates:
                - Path=/auth/**

            # User service
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/api/users/**,/api/customers/**,/api/sellers/**,/api/admins/**

            # Product service
            - id: product-service
              uri: lb://product-service
              predicates:
                - Path=/api/products/**

            # category service
            - id: category-service
              uri: lb://CARTIGO-CATEGORY-SERVICE
              predicates:
                - Path=/api/categories/**

            # Cart service
            - id: cart-service
              uri: lb://cartigo-cart-service
              predicates:
                - Path=/api/cart/**

            # Inventory service
            - id: inventory-service
              uri: lb://INVENTORY-SERVICE
              predicates:
                - Path=/api/inventory/**

            # Order service
            - id: order-service
              uri: lb://cartigo-order-service
              predicates:
                - Path=/api/orders/**

            # Payment service
            - id: payment-service
              uri: lb://cartigo-payment-service
              predicates:
                - Path=/api/payments/**

            # Review service
            - id: review-service
              uri: lb://cartigo-review-service
              predicates:
                - Path=/api/reviews/**

            # Return/Refund service (your controller is /api/returns/**)
            - id: return-refund-service
              uri: lb://cartigo-return-refund-service
              predicates:
                - Path=/api/returns/**

            # Reporting/Analytics service
            - id: reporting-analytics-service
              uri: lb://cartigo-reporting-analytics-service
              predicates:
                - Path=/api/analytics/**

            - id: category-service-swagger
              uri: lb://CARTIGO-CATEGORY-SERVICE
              predicates:
                - Path=/category-service-swagger/v3/api-docs
              filters:
                - StripPrefix=1

            - id: auth-service-swagger
              uri: lb://CARTIGO-AUTH-SERVICE
              predicates:
                - Path=/auth-service-swagger/v3/api-docs
              filters:
                - StripPrefix=1

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

management:
  endpoints:
    web:
      exposure:
        include: "*"
springdoc:
  swagger-ui:
    urls:
      - name: product-service
        url: /product-service/v3/api-docs

      - name: category-service
        url: /category-service-swagger/v3/api-docs

      - name: auth-service
        url: /auth-service-swagger/v3/api-docs

      - name: user-service
        url: /user-service/v3/api-docs

      - name: inventory-service
        url: /inventory-service/v3/api-docs
jwt:
  secret: ${JWT_SECRET:change-me-to-a-long-secret-change-me-to-a-long-secret}
  expirationMinutes: ${JWT_EXP_MINUTES:60}
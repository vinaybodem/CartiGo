server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth
          uri: lb://auth-service
          predicates:
            - Path=/auth/**
        - id: users
          uri: lb://user-service
          predicates:
            - Path=/users/**,/addresses/**,/sellers/**
        - id: products
          uri: lb://product-service
          predicates:
            - Path=/products/**,/meta/**
        - id: inventory
          uri: lb://inventory-service
          predicates:
            - Path=/inventory/**
        - id: cart
          uri: lb://cart-service
          predicates:
            - Path=/cart/**
        - id: orders
          uri: lb://order-service
          predicates:
            - Path=/orders/**,/analytics/orders
        - id: payments
          uri: lb://payment-service
          predicates:
            - Path=/payments/**
        - id: reviews
          uri: lb://review-service
          predicates:
            - Path=/reviews/**
        - id: returns
          uri: lb://return-refund-service
          predicates:
            - Path=/returns/**
        - id: search
          uri: lb://search-service
          predicates:
            - Path=/search/**
        - id: admin
          uri: lb://admin-service
          predicates:
            - Path=/admin/**
        - id: analytics
          uri: lb://reporting-analytics-service
          predicates:
            - Path=/analytics/**
        - id: notify
          uri: lb://notification-service
          predicates:
            - Path=/notify/**
        - id: audit
          uri: lb://audit-logging-service
          predicates:
            - Path=/audit/**

cartigo:
  jwt:
    secret: "cartigo-super-secret-key-please-change-32chars-min"
    expiration-seconds: 86400

eureka:
  client:
    serviceUrl:
      defaultZone: http://service-registry:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

spring:
  jackson:
    serialization:
      write-dates-as-timestamps: false

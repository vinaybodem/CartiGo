 spring:
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_APP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

 eureka:
   client:
     service-url:
       defaultZone: http://localhost:8761/eureka

 app:
   security:
     permit-all: true

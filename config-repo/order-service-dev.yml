server:
  port: 8088

spring:

  datasource:
    url: jdbc:mysql://localhost:3306/cartigo_orders_db?createDatabaseIfNotExist=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    instance:
      prefer-ip-address: true
jwt:
  secret: "change-me-to-a-long-secret-change-me-to-a-long-secret"

cartigo:
  jwt:
    secret: "cartigo-super-secret-key-please-change-32chars-min"
    expiration-seconds: 86400

  bootstrap:
    admin:
      email: ${CARTIGO_BOOTSTRAP_ADMIN_EMAIL:admin@cartigo.com}
      password: ${CARTIGO_BOOTSTRAP_ADMIN_PASSWORD:Admin@123}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info


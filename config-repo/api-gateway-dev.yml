server:
  port: 8080

spring:
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true

          # ✅ Gateway-level CORS (recommended)
          globalcors:
            corsConfigurations:
              '[/**]':
                allowedOrigins:
                  - http://127.0.0.1:5500
                  - http://localhost:5500
                  - http://localhost:8080
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - PATCH
                  - DELETE
                  - OPTIONS
                allowedHeaders: "*"
                allowCredentials: true

          routes:
            # Auth service
            - id: auth-service
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/auth/**

            # User service
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/api/users/**,/api/customers/**,/api/sellers/**,/api/admins/**

            # Product service
            - id: product-service
              uri: lb://product-service
              predicates:
                - Path=/api/products/**,/api/images/**

            # category service
            - id: category-service
              uri: lb://CARTIGO-CATEGORY-SERVICE
              predicates:
                - Path=/api/categories/**

            # Cart service
            - id: cart-service
              uri: lb://CART-SERVICE
              predicates:
                - Path=/api/cart/**

            # Inventory service
            - id: inventory-service
              uri: lb://INVENTORY-SERVICE
              predicates:
                - Path=/api/inventory/**

            # Order service
            - id: order-service
              uri: lb://order-service
              predicates:
                - Path=/api/orders/**

            # Payment service
            - id: payment-service
              uri: lb://payment-service
              predicates:
                - Path=/api/payments/**

            - id: order-service-swagger
              uri: lb://order-service
              predicates:
                - Path=/order-service-swagger/v3/api-docs
              filters:
                - StripPrefix=1
            - id: payment-service-swagger
              uri: lb://payment-service
              predicates:
                - Path=/payment-service-swagger/v3/api-docs
              filters:
                - StripPrefix=1

            - id: category-service-swagger
              uri: lb://CARTIGO-CATEGORY-SERVICE
              predicates:
                - Path=/category-service-swagger/v3/api-docs
              filters:
                - StripPrefix=1

            - id: auth-service-swagger
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/auth-service-swagger/v3/api-docs
              filters:
                - StripPrefix=1

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

management:
  endpoints:
    web:
      exposure:
        include: "*"
  tracing:
    sampling:
      probability: 1.0
    export:
      enabled: true
      zipkin:
        enabled: true
        endpoint: http://localhost:9411/api/v2/spans

springdoc:
  swagger-ui:
    urls:
      - name: product-service
        url: /product-service/v3/api-docs

      - name: category-service
        url: /category-service-swagger/v3/api-docs

      - name: auth-service
        url: /auth-service-swagger/v3/api-docs

      - name: user-service
        url: /user-service/v3/api-docs

      - name: inventory-service
        url: /inventory-service/v3/api-docs

      - name: cart-service
        url: /cart-service/v3/api-docs

      - name: order-service
        url: /order-service-swagger/v3/api-docs

      - name: payment-service
        url: /payment-service-swagger/v3/api-docs
jwt:
  secret: ${JWT_SECRET:change-me-to-a-long-secret-change-me-to-a-long-secret}
  expirationMinutes: ${JWT_EXP_MINUTES:60}

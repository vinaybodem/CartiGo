server:
  port: 8085
spring:

  datasource:
    url: jdbc:mysql://localhost:3306/cartigo_inventory_db?createDatabaseIfNotExist=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
jwt:
  secret: "change-me-to-a-long-secret-change-me-to-a-long-secret"
#${JWT_SECRET:change-me-to-a-long-secret-change-me-to-a-long-secret}
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true
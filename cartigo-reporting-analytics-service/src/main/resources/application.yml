server:
  port: 8090

spring:
  application:
    name: cartigo-reporting-analytics-service
  datasource:
    url: jdbc:mysql://localhost:3306/cartigo_reporting_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

app:
  security:
    permit-all: true

reporting:
  aggregation:
    enabled: true
    # Runs every 15 minutes by default (cron)
    cron: "0 */15 * * * *"
  sources:
    orders:
      enabled: true
      name: cartigo-order-service
    payments:
      enabled: false
      name: cartigo-payment-service
    returns:
      enabled: true
      name: cartigo-return-refund-service
    reviews:
      enabled: true
      name: cartigo-review-service

springdoc:
  swagger-ui:
    path: /swagger-ui.html

server:
  port: 8084

spring:
  application:
    name: cartigo-cart-service
  datasource:
    url: jdbc:mysql://localhost:3306/cartigo_cart_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

app:
  security:
    permit-all: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

version: "3.9"

services:
  mysql:
    image: mysql:8.4
    container_name: cartigo-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    command: ["--default-authentication-plugin=mysql_native_password"]
    volumes:
      - cartigo_mysql_data:/var/lib/mysql

  config-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: cartigo-config-server
    container_name: cartigo-config-server
    environment:
      SPRING_PROFILES_ACTIVE: native
      SPRING_CLOUD_CONFIG_SERVER_NATIVE_SEARCH_LOCATIONS: file:///D:/CartiGo/CartiGo/config-repo
    volumes:
      - ./config-repo:/config-repo:ro
    ports:
      - "8888:8888"
    depends_on:
      - mysql

